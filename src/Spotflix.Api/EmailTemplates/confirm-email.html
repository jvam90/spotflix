<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="utf-8"></head>
<body style="margin:0;padding:0;background:#0f0f0f;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#0f0f0f;padding:40px 0;">
    <tr>
      <td align="center">
        <table width="560" cellpadding="0" cellspacing="0" style="background:#1a1a1a;border-radius:12px;overflow:hidden;max-width:560px;">
          <tr>
            <td style="background:#111111;padding:28px 40px;border-bottom:3px solid #1db954;">
              <span style="font-size:26px;font-weight:700;color:#ffffff;letter-spacing:1px;">&#127925; Spotflix</span>
            </td>
          </tr>
          <tr>
            <td style="padding:36px 40px;">
              <h2 style="margin:0 0 12px;font-size:20px;color:#ffffff;font-weight:600;">Confirme seu e-mail</h2>
              <p style="margin:0 0 28px;font-size:15px;color:#a0a0a0;line-height:1.6;">
                Olá, <strong style="color:#ffffff;">{{FullName}}</strong>! Para ativar sua conta, copie os dados abaixo e insira-os na tela de confirmação.
              </p>

              <p style="margin:0 0 6px;font-size:11px;font-weight:700;color:#1db954;text-transform:uppercase;letter-spacing:1.5px;">User ID</p>
              <div style="background:#0f0f0f;border:1px solid #2a2a2a;border-radius:8px;padding:14px 16px;margin-bottom:20px;">
                <code style="font-size:13px;color:#e0e0e0;word-break:break-all;">{{UserId}}</code>
              </div>

              <p style="margin:0 0 6px;font-size:11px;font-weight:700;color:#1db954;text-transform:uppercase;letter-spacing:1.5px;">Token</p>
              <div style="background:#0f0f0f;border:1px solid #2a2a2a;border-radius:8px;padding:14px 16px;margin-bottom:28px;">
                <code style="font-size:12px;color:#e0e0e0;word-break:break-all;">{{Token}}</code>
              </div>

              <p style="margin:0;font-size:13px;color:#606060;line-height:1.6;">
                Se você não criou uma conta no Spotflix, ignore este e-mail.
              </p>
            </td>
          </tr>
          <tr>
            <td style="padding:20px 40px;border-top:1px solid #2a2a2a;">
              <p style="margin:0;font-size:12px;color:#505050;text-align:center;">
                &copy; 2026 Spotflix &mdash; sua música, em todo lugar.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
